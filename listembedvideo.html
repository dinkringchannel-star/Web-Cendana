<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Embed Video List Example</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
        }
        .video-list {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin: 20px;
        }
        .video-item {
            border: 1px solid #ccc;
            padding: 10px;
            box-shadow: 0px 0px 10px rgba(0,0,0,0.1);
        }
        iframe {
            width: 100%;
            height: 215px;
        }
        @media (min-width: 468px) {
            iframe {
                width: 300px;
                height: 200px;
            }
        }
    </style>
</head>
<body>
    <h1>Video Embed List Example</h1>
    
    <div class="video-list">
        <!-- Video 1 -->
        <div class="video-item">
            <h2>Video 1: Example Title</h2>
            <iframe src="https://www.youtube.com/embed/dQw4w9WgXcQ" 
                    title="YouTube video player 1" frameborder="0" 
                    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
                    allowfullscreen>
            </iframe>
        </div>

        <!-- Video 2 -->
        <div class="video-item">
            <h2>Video 2: Another Example Title</h2>
            <iframe src="https://www.youtube.com/embed/9bZkp7q19f0" 
                    title="YouTube video player 2" frameborder="0" 
                    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
                    allowfullscreen>
            </iframe>
        </div>

        <!-- Video 3 -->
        <div class="video-item">
            <h2>Video 3: Yet Another Example</h2>
            <iframe src="https://www.youtube.com/embed/3JZ_D3ELwOQ" 
                    title="YouTube video player 3" frameborder="0" 
                    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
                    allowfullscreen>
            </iframe>
        </div>
    </div>

</body>
</html>
