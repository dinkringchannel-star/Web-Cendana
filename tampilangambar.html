<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galeri Gambar Responsif</title>
    
    <style>
        /* Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            background-color: #f5f5f5;
        }

        h1 {
            text-align: center;
            margin-bottom: 20px;
        }

        /* Container grid gambar */
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(100px, 1fr)); /* Grid dinamis */
            grid-gap: 15px;
        }

        .gallery img {
            width: 100%;
            height: auto;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s ease;
        }

        /* Efek zoom saat gambar dihover */
        .gallery img:hover {
            transform: scale(1.05);
        }

        /* Responsif */
        @media (max-width: 600px) {
            .gallery {
                grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            }
        }
    </style>
</head>
<body>

    <h1>Galeri Gambar Responsif</h1>

    <div class="gallery">
        <!-- Gambar-gambar galeri -->
        <img src="pertemuanwarga.jpg" alt="Gambar 1">
        <img src="perosotan.jpg" alt="Gambar 2">
        <img src="Saung.jpg" alt="Gambar 3">
        <img src="https://via.placeholder.com/300" alt="Gambar 4">
        <img src="https://via.placeholder.com/300" alt="Gambar 5">
        <img src="https://via.placeholder.com/300" alt="Gambar 6">
        <img src="https://via.placeholder.com/300" alt="Gambar 7">
        <img src="https://via.placeholder.com/300" alt="Gambar 8">
        <img src="https://via.placeholder.com/300" alt="Gambar 9">
    </div>

</body>
</html>
